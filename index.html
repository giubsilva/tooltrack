<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ToolTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111418;
  --card: #1a1e26;
  --card2: #1f2430;
  --border: #272d3d;
  --accent: #f5a623;
  --accent-dim: rgba(245,166,35,0.12);
  --green: #2dd4a0;
  --green-dim: rgba(45,212,160,0.12);
  --red: #f56565;
  --blue: #60a5fa;
  --text: #eef0f6;
  --muted: #6b7492;
  --r: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; overflow: hidden; display: flex; flex-direction: column; }

/* HEADER */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; letter-spacing: 1px; color: var(--accent); flex: 1; }
.logo span { color: var(--text); }
.sync-time { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.3; min-width: 48px; }
.sync-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px; color: var(--muted); font-size: 12px; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s;
}
.sync-btn:active { background: var(--border); }
.sync-icon { display: inline-block; font-size: 13px; }
.sync-btn.syncing .sync-icon { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SEARCH */
.search-area { padding: 10px 16px 0; flex-shrink: 0; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 11px 14px 11px 42px; color: var(--text);
  font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }

/* FILTER ROW — wraps both desktop chips and mobile dropdown */
#filterRow { flex-shrink: 0; }

/* Mobile / tablet filter: All button + select dropdown */
.filter-mobile {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px 0;
}
.site-select {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  min-width: 0;
}
.site-select:focus { border-color: var(--accent); }
.site-select option { background: #1a1e26; color: var(--text); }

/* Desktop filter: arrow buttons + scrollable chips */
.filter-desktop { display: none; align-items: center; padding: 10px 16px 0; gap: 6px; }
.chip-arrow {
  background: var(--card); border: 1px solid var(--border); border-radius: 50%;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text); font-size: 18px; flex-shrink: 0;
  transition: background 0.15s; line-height: 1; padding: 0;
}
.chip-arrow:hover { background: var(--border); }
.filter-desktop .chips-row { padding: 0; flex: 1; min-width: 0; overflow: hidden; }

/* CHIPS */
.chips-row { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--muted);
  white-space: nowrap; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chip:active { opacity: 0.7; }

/* TABS */
.nav-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; margin-top: 10px; padding: 0 16px; }
.nav-tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted);
  cursor: pointer; border-bottom: 2.5px solid transparent; transition: all 0.15s;
}
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* SCROLL */
.scroll-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 10px 16px calc(16px + var(--safe-bottom)); }

/* RESULTS BAR */
.results-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 0 8px; font-size: 11px; color: var(--muted); }
.results-bar strong { color: var(--accent); }

/* TOOL CARD */
.tool-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px; overflow: hidden; transition: border-color 0.15s; }
.tool-card-body { display: flex; align-items: center; padding: 13px 14px; gap: 10px; }
.tool-card:active { border-color: var(--accent); }
.tool-status-bar { width: 3px; border-radius: 3px; align-self: stretch; flex-shrink: 0; background: var(--green); }
.tool-status-bar.unknown { background: var(--accent); }
.tool-status-bar.decom { background: var(--red); }
.tool-status-bar.repair { background: var(--blue); }
.tool-details { flex: 1; min-width: 0; }
.tool-name { font-size: 14px; font-weight: 500; line-height: 1.3; word-break: break-word; }
.tool-sub { font-size: 11px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-loc-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.loc-badge { background: var(--green-dim); color: var(--green); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.loc-badge.unknown { background: rgba(245,166,35,0.12); color: var(--accent); }
.loc-badge.decom { background: rgba(245,101,101,0.12); color: var(--red); }
.loc-badge.repair { background: rgba(96,165,250,0.12); color: var(--blue); }
.move-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.move-btn:active { background: var(--accent); border-color: var(--accent); color: #000; }

/* SITE CARDS (By Site tab) */
.site-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; overflow: hidden; }
.site-card:active { border-color: var(--accent); }
.site-card-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.site-name { font-weight: 600; font-size: 14px; }
.site-pill { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
.site-preview { padding: 10px 16px 12px; display: flex; flex-direction: column; gap: 3px; }
.site-preview-item { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.site-preview-more { font-size: 12px; color: var(--accent); margin-top: 2px; }

/* LOG SEARCH */
.log-search { margin: 6px 0 10px; }

/* MANAGE SITES TAB */
.manage-section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted); font-weight: 600; margin: 14px 0 8px;
}
.manage-section-label:first-child { margin-top: 4px; }
.add-site-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin-bottom: 16px; }
.add-site-form .input-field { margin-bottom: 10px; }
.add-site-form .input-field:last-of-type { margin-bottom: 12px; }
.btn-add-site {
  width: 100%; padding: 13px; border-radius: 9px; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; border: none; background: var(--accent);
  color: #000; transition: opacity 0.15s;
}
.btn-add-site:active { opacity: 0.75; }
.btn-add-site:disabled { opacity: 0.4; cursor: not-allowed; }
.manage-site-row {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
}
.manage-site-info { flex: 1; min-width: 0; }
.manage-site-name { font-size: 14px; font-weight: 500; }
.manage-site-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.manage-site-count { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
.btn-remove-site {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  padding: 7px 11px; color: var(--red); font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer; flex-shrink: 0; transition: all 0.15s;
}
.btn-remove-site:active { background: rgba(245,101,101,0.12); border-color: var(--red); }

/* HISTORY */
.history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 8px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
.history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
.history-body { flex: 1; min-width: 0; }
.history-title { font-size: 13px; font-weight: 500; }
.history-route { font-size: 12px; color: var(--muted); margin-top: 3px; }
.history-route strong { color: var(--green); }
.history-who { font-size: 11px; color: var(--muted); margin-top: 2px; }
.history-time { font-size: 11px; color: var(--muted); flex-shrink: 0; text-align: right; }

/* MOVE SHEET */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 540px; max-height: 92vh; display: flex; flex-direction: column; animation: slideUp 0.25s ease; padding-bottom: var(--safe-bottom); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 38px; height: 4px; background: var(--border); border-radius: 4px; margin: 12px auto 6px; flex-shrink: 0; }
.sheet-header { padding: 4px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sheet-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.sheet-subtitle { font-size: 13px; color: var(--text); margin-top: 2px; line-height: 1.4; }
.sheet-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 20px; }
.sheet-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
.current-loc-tag { display: inline-flex; align-items: center; gap: 7px; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
.arrow-row { text-align: center; color: var(--muted); font-size: 18px; margin-bottom: 14px; }
.sites-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
.site-opt { background: var(--card2); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px; font-size: 13px; font-weight: 500; font-family: inherit; color: var(--text); cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.2; }
.site-opt:active { border-color: var(--accent); }
.site-opt.picked { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.input-field { width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 9px; padding: 11px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
.input-field:focus { border-color: var(--accent); }
.sheet-footer { padding: 10px 20px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
.btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-cancel { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }
.btn-confirm { background: var(--accent); color: #000; }
.btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

/* EMPTY */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* TOAST */
.toast { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 300; transition: transform 0.3s ease; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--red); }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 400; gap: 14px; transition: opacity 0.3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
.loading-logo span { color: var(--text); }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-msg { font-size: 13px; color: var(--muted); }

/* ERROR STATE */
.error-state { background: rgba(245,101,101,0.08); border: 1px solid rgba(245,101,101,0.3); border-radius: var(--r); padding: 16px; margin: 12px 0; font-size: 13px; color: var(--red); line-height: 1.5; }

/* ── DESKTOP / LAPTOP (≥ 1024px) ──────────────────── */
@media (min-width: 1024px) {
  /* Show arrow-chips, hide dropdown */
  .filter-desktop { display: flex; }
  .filter-mobile  { display: none; }

  /* Two-column tool list */
  #toolList { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  #toolList .tool-card { margin-bottom: 0; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">🔧 Tool<span>Track</span></div>
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">Loading tools...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔧 Tool<span>Track</span></div>
  <div class="sync-time" id="syncTime"></div>
  <button class="sync-btn" id="syncBtn" onclick="syncAll()">
    <span class="sync-icon" id="syncIcon">↻</span>
    <span>Sync</span>
  </button>
</div>

<!-- SEARCH (tools tab only) -->
<div class="search-area" id="toolsSearch">
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="search" id="searchInput" placeholder="Search tools or locations..." oninput="applyFilters()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<!-- FILTER ROW -->
<div id="filterRow">
  <!-- Desktop: scroll arrows + chips -->
  <div class="filter-desktop">
    <button class="chip-arrow" onclick="scrollChips(-1)">&#8249;</button>
    <div class="chips-row" id="chipsRow"></div>
    <button class="chip-arrow" onclick="scrollChips(1)">&#8250;</button>
  </div>
  <!-- Mobile / tablet: All button + dropdown -->
  <div class="filter-mobile">
    <button class="chip active" id="allChipMobile" onclick="setSiteFilter('')">All</button>
    <select class="site-select" id="siteSelect" onchange="setSiteFilterFromDropdown(this)">
      <option value="">All Sites</option>
    </select>
  </div>
</div>

<!-- TABS -->
<div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('tools',this)">Tools</div>
  <div class="nav-tab" onclick="switchTab('sites',this)">By Site</div>
  <div class="nav-tab" onclick="switchTab('log',this)">Move Log</div>
  <div class="nav-tab" onclick="switchTab('manage',this)">Sites +</div>
</div>

<!-- CONTENT -->
<div class="scroll-content" id="scrollContent">
  <div id="tabTools">
    <div class="results-bar"><span id="resultsInfo">Loading...</span></div>
    <div id="toolList"></div>
  </div>

  <div id="tabSites" style="display:none">
    <div id="siteList"></div>
  </div>

  <div id="tabLog" style="display:none">
    <div class="log-search">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="search" id="logSearchInput" placeholder="Search tool, location or person..." oninput="applyLogFilter()" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
    <div id="logList"></div>
  </div>

  <div id="tabManage" style="display:none">
    <div class="manage-section-label">Add New Site</div>
    <div class="add-site-form">
      <input type="text" class="input-field" id="newSiteName" placeholder="Site name, e.g. 4583 West 3rd" autocomplete="off" autocorrect="off" spellcheck="false">
      <input type="text" class="input-field" id="newSiteAddedBy" placeholder="Your name" autocomplete="name">
      <button class="btn-add-site" id="addSiteBtn" onclick="addSite()">Add Site</button>
    </div>
    <div class="manage-section-label">Current Sites</div>
    <div id="manageSiteList"></div>
  </div>
</div>

<!-- MOVE SHEET -->
<div class="overlay" id="moveOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">Move Tool</div>
      <div class="sheet-subtitle" id="sheetToolName"></div>
    </div>
    <div class="sheet-body">
      <div class="sheet-label">Current Location</div>
      <div class="current-loc-tag"><span>📍</span><span id="sheetLocText"></span></div>
      <div class="arrow-row">↓ Move to</div>
      <div class="sheet-label">Select New Location</div>
      <div class="sites-grid" id="sitesGrid"></div>
      <div class="sheet-label">Your name (for the log)</div>
      <input type="text" class="input-field" id="movedByInput" placeholder="John Doe" autocomplete="name">
    </div>
    <div class="sheet-footer">
      <button class="btn btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-confirm" id="confirmBtn" onclick="confirmMove()">Move It →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────
//  ▶  CONFIGURATION — paste your Apps Script URL below
// ─────────────────────────────────────────────────────────────────
const CONFIG = {
  scriptUrl: "https://script.google.com/macros/s/AKfycbxRB3UqSIUbLaWI9t5N9W1y6WkbTMSWhumm0g8zi4rVOAP7KfEktUK-GBD70D-Dxp6M/exec",
};
// ─────────────────────────────────────────────────────────────────

// ── STATE ────────────────────────────────────────────
let tools            = [];
let moveLog          = [];
let sites            = [];
let selectedToolName = null;
let selectedSiteVal  = null;
let siteFilter       = '';
let logFilter        = '';
let lastSync         = null;
let isSyncing        = false;

const savedName = () => localStorage.getItem('tt_worker_name') || '';

// ── API CALLS ────────────────────────────────────────

async function fetchData() {
  const res = await fetch(CONFIG.scriptUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function post(body) {
  const res = await fetch(CONFIG.scriptUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── SYNC ─────────────────────────────────────────────

async function syncAll(quiet = false) {
  if (isSyncing) return;
  isSyncing = true;
  document.getElementById('syncBtn').classList.add('syncing');
  try {
    const data = await fetchData();
    tools   = data.tools  || [];
    moveLog = data.log    || [];
    sites   = data.sites  || [];
    lastSync = new Date();
    updateSyncTime();
    applyFilters();
    buildChips();
    renderSites();
    renderLog();
    renderManage();
    if (!quiet) showToast('✅ Synced — ' + tools.length + ' tools');
  } catch(e) {
    console.error(e);
    showToast('⚠️ Sync failed — check connection', true);
  }
  isSyncing = false;
  document.getElementById('syncBtn').classList.remove('syncing');
}

function updateSyncTime() {
  if (!lastSync) return;
  const h = lastSync.getHours().toString().padStart(2,'0');
  const m = lastSync.getMinutes().toString().padStart(2,'0');
  document.getElementById('syncTime').innerHTML = `Synced<br>${h}:${m}`;
}

// ── RENDERING ────────────────────────────────────────

function locClass(loc) {
  if (!loc || loc === '?') return 'unknown';
  const l = loc.toLowerCase();
  if (l.includes('decom') || l.includes('scrap')) return 'decom';
  if (l.includes('repair')) return 'repair';
  return '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function siteNames() {
  const sheetNames = sites.map(s => s.name);
  const toolLocs   = tools.map(t => t.loc).filter(l => l && l !== '?');
  return [...new Set([...sheetNames, ...toolLocs])].sort();
}

function buildChips() {
  const names = siteNames();
  document.getElementById('chipsRow').innerHTML =
    `<div class="chip ${!siteFilter?'active':''}" onclick="setSiteFilter('')">All</div>` +
    names.map(s =>
      `<div class="chip ${siteFilter===s?'active':''}" onclick="setSiteFilter('${s.replace(/'/g,"\\'")}')">📍 ${esc(s)}</div>`
    ).join('');
  buildMobileFilter();
}

function buildMobileFilter() {
  const select = document.getElementById('siteSelect');
  const names  = siteNames();
  select.innerHTML =
    '<option value="">All Sites</option>' +
    names.map(s =>
      `<option value="${esc(s)}" ${siteFilter===s?'selected':''}>${esc(s)}</option>`
    ).join('');
}

function setSiteFilter(site) {
  siteFilter = site;
  // Sync mobile UI
  document.getElementById('siteSelect').value = site;
  document.getElementById('allChipMobile').classList.toggle('active', !site);
  buildChips();
  applyFilters();
}

function setSiteFilterFromDropdown(select) {
  setSiteFilter(select.value);
}

function scrollChips(dir) {
  document.getElementById('chipsRow').scrollBy({ left: dir * 200, behavior: 'smooth' });
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const filtered = tools.filter(t => {
    const matchQ = !q ||
      t.name.toLowerCase().includes(q) ||
      (t.notes||'').toLowerCase().includes(q) ||
      (t.loc||'').toLowerCase().includes(q);
    const matchSite = !siteFilter || t.loc === siteFilter;
    return matchQ && matchSite;
  });

  const el = document.getElementById('toolList');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No tools match your search</p></div>';
  } else {
    el.innerHTML = filtered.map(t => {
      const cls = locClass(t.loc);
      return `<div class="tool-card">
        <div class="tool-card-body">
          <div class="tool-status-bar ${cls}"></div>
          <div class="tool-details">
            <div class="tool-name">${esc(t.name)}</div>
            ${t.notes ? `<div class="tool-sub">${esc(t.notes)}</div>` : ''}
            <div class="tool-loc-row">
              <div class="loc-badge ${cls}">📍 ${esc(t.loc||'Unknown')}</div>
            </div>
          </div>
          <button class="move-btn" onclick="openSheet('${esc(t.name)}')">Move</button>
        </div>
      </div>`;
    }).join('');
  }

  const info = document.getElementById('resultsInfo');
  info.innerHTML = (q||siteFilter)
    ? `<strong>${filtered.length}</strong> of ${tools.length} tools`
    : `<strong>${tools.length}</strong> tools`;
}

function renderSites() {
  const el = document.getElementById('siteList');
  const names = siteNames();
  let html = '';
  for (const site of names) {
    const st = tools.filter(t => t.loc === site);
    if (!st.length) continue;
    const shown = st.slice(0,4);
    html += `<div class="site-card" onclick="jumpSite('${site.replace(/'/g,"\\'")}')">
      <div class="site-card-hdr">
        <div class="site-name">📍 ${esc(site)}</div>
        <div class="site-pill">${st.length}</div>
      </div>
      <div class="site-preview">
        ${shown.map(t => `<div class="site-preview-item">• ${esc(t.name)}</div>`).join('')}
        ${st.length>4 ? `<div class="site-preview-more">+${st.length-4} more</div>` : ''}
      </div>
    </div>`;
  }
  el.innerHTML = html || '<div class="empty"><div class="empty-icon">📍</div><p>No sites with tools</p></div>';
}

function applyLogFilter() {
  logFilter = (document.getElementById('logSearchInput').value||'').toLowerCase().trim();
  renderLog();
}

function renderLog() {
  const el = document.getElementById('logList');
  const filtered = logFilter
    ? moveLog.filter(h =>
        h.name.toLowerCase().includes(logFilter) ||
        (h.from||'').toLowerCase().includes(logFilter) ||
        (h.to||'').toLowerCase().includes(logFilter) ||
        (h.by||'').toLowerCase().includes(logFilter)
      )
    : moveLog;

  if (!filtered.length) {
    el.innerHTML = logFilter
      ? '<div class="empty"><div class="empty-icon">🔍</div><p>No moves match your search</p></div>'
      : '<div class="empty"><div class="empty-icon">📋</div><p>No moves logged yet.<br>Move a tool to see history here.</p></div>';
    return;
  }

  el.innerHTML = filtered.slice(0,100).map(h =>
    `<div class="history-card">
      <div class="history-dot"></div>
      <div class="history-body">
        <div class="history-title">${esc(h.name)}</div>
        <div class="history-route">${esc(h.from||'?')} → <strong>${esc(h.to)}</strong></div>
        ${h.by ? `<div class="history-who">by ${esc(h.by)}</div>` : ''}
      </div>
      <div class="history-time">${esc(h.time)}</div>
    </div>`
  ).join('');
}

function renderManage() {
  const addedByInput = document.getElementById('newSiteAddedBy');
  if (!addedByInput.value) addedByInput.value = savedName();

  const el = document.getElementById('manageSiteList');
  if (!sites.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📍</div><p>No sites yet.<br>Add one above.</p></div>';
    return;
  }

  el.innerHTML = sites.map(s => {
    const toolCount = tools.filter(t => t.loc === s.name).length;
    return `<div class="manage-site-row">
      <div class="manage-site-info">
        <div class="manage-site-name">📍 ${esc(s.name)}</div>
        <div class="manage-site-meta">Added by ${esc(s.addedBy||'—')} · ${esc(s.addedAt||'')}</div>
      </div>
      ${toolCount > 0
        ? `<div class="manage-site-count">${toolCount} tool${toolCount>1?'s':''}</div>`
        : `<button class="btn-remove-site" onclick="removeSite('${s.name.replace(/'/g,"\\'")}')">Remove</button>`
      }
    </div>`;
  }).join('');
}

// ── TABS ─────────────────────────────────────────────

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabTools').style.display  = tab==='tools'  ? 'block' : 'none';
  document.getElementById('tabSites').style.display  = tab==='sites'  ? 'block' : 'none';
  document.getElementById('tabLog').style.display    = tab==='log'    ? 'block' : 'none';
  document.getElementById('tabManage').style.display = tab==='manage' ? 'block' : 'none';
  document.getElementById('toolsSearch').style.display = tab==='tools' ? 'block' : 'none';
  document.getElementById('filterRow').style.display   = tab==='tools' ? ''      : 'none';
  document.getElementById('scrollContent').scrollTo(0,0);
}

function jumpSite(site) {
  switchTab('tools', document.querySelector('.nav-tab'));
  setSiteFilter(site);
  document.getElementById('scrollContent').scrollTo(0,0);
}

// ── MOVE SHEET ───────────────────────────────────────

function openSheet(toolName) {
  selectedToolName = toolName;
  selectedSiteVal  = null;
  const t = tools.find(x => x.name === toolName);
  if (!t) return;

  document.getElementById('sheetToolName').textContent = t.name;
  document.getElementById('sheetLocText').textContent  = t.loc || 'Unknown';
  document.getElementById('movedByInput').value = savedName();

  document.getElementById('sitesGrid').innerHTML = siteNames().map(s =>
    `<button class="site-opt ${s===t.loc?'picked':''}" onclick="pickSite('${s.replace(/'/g,"\\'")}',this)">${esc(s)}</button>`
  ).join('');

  document.getElementById('moveOverlay').classList.add('open');
  document.querySelector('.sheet-body').scrollTo(0,0);
}

function pickSite(site, el) {
  selectedSiteVal = site;
  document.querySelectorAll('.site-opt').forEach(b => b.classList.remove('picked'));
  el.classList.add('picked');
}

function closeSheet() {
  document.getElementById('moveOverlay').classList.remove('open');
  selectedToolName = null;
  selectedSiteVal  = null;
}

async function confirmMove() {
  const newLoc  = selectedSiteVal;
  const movedBy = document.getElementById('movedByInput').value.trim();

  if (!newLoc) { showToast('⚠️ Select a location from the list', true); return; }

  const t = tools.find(x => x.name === selectedToolName);
  if (!t) return;

  if (movedBy) localStorage.setItem('tt_worker_name', movedBy);

  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.disabled = true;
  confirmBtn.textContent = 'Saving...';

  const oldLoc = t.loc;
  try {
    await post({ action: 'move', toolName: t.name, fromLoc: oldLoc, newLoc, movedBy });

    t.loc = newLoc;
    moveLog.unshift({ name: t.name, from: oldLoc, to: newLoc, by: movedBy, time: 'just now' });

    closeSheet();
    applyFilters();
    buildChips();
    renderSites();
    renderLog();

    const short = t.name.length > 26 ? t.name.slice(0,26)+'…' : t.name;
    showToast(`✅ ${short} → ${newLoc}`);
  } catch(e) {
    console.error(e);
    showToast('⚠️ Save failed — check connection', true);
  }

  confirmBtn.disabled = false;
  confirmBtn.textContent = 'Move It →';
}

// ── MANAGE SITES ─────────────────────────────────────

async function addSite() {
  const siteName = document.getElementById('newSiteName').value.trim();
  const addedBy  = document.getElementById('newSiteAddedBy').value.trim();

  if (!siteName) { showToast('⚠️ Enter a site name', true); return; }
  if (!addedBy)  { showToast('⚠️ Enter your name', true); return; }

  if (sites.some(s => s.name.toLowerCase() === siteName.toLowerCase())) {
    showToast('⚠️ That site already exists', true); return;
  }

  if (addedBy) localStorage.setItem('tt_worker_name', addedBy);

  const btn = document.getElementById('addSiteBtn');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    await post({ action: 'addSite', siteName, addedBy });

    const now = new Date();
    const timeStr = now.toLocaleString('en-CA', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    sites.push({ name: siteName, addedBy, addedAt: timeStr });

    document.getElementById('newSiteName').value = '';
    buildChips();
    renderManage();
    showToast(`✅ "${siteName}" added`);
  } catch(e) {
    console.error(e);
    showToast('⚠️ Failed to add site — check connection', true);
  }

  btn.disabled = false;
  btn.textContent = 'Add Site';
}

async function removeSite(siteName) {
  const toolCount = tools.filter(t => t.loc === siteName).length;
  if (toolCount > 0) {
    showToast(`⚠️ Move the ${toolCount} tool${toolCount>1?'s':''} off this site first`, true);
    return;
  }

  try {
    await post({ action: 'removeSite', siteName });

    sites = sites.filter(s => s.name !== siteName);
    if (siteFilter === siteName) siteFilter = '';
    buildChips();
    renderManage();
    showToast(`✅ "${siteName}" removed`);
  } catch(e) {
    console.error(e);
    showToast('⚠️ Failed to remove site — check connection', true);
  }
}

// ── TOAST ────────────────────────────────────────────

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── INIT ─────────────────────────────────────────────

document.getElementById('moveOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeSheet();
});

async function init() {
  try {
    await syncAll(true);
  } catch(e) {
    document.getElementById('loadingMsg').textContent = 'Could not load data.';
    showToast('⚠️ Could not connect', true);
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  setTimeout(() => document.getElementById('loadingOverlay').style.display='none', 400);
}

init();
</script>
